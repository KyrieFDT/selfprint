version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=print_shop
      - DB_USER=printshop
      - DB_PASSWORD=${DB_PASSWORD:-printshop123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - WX_APPID=${WX_APPID}
      - WX_SECRET=${WX_SECRET}
      - WX_MCHID=${WX_MCHID}
      - WX_API_KEY=${WX_API_KEY}
      - PC_AGENT_SECRET=${PC_AGENT_SECRET:-agent-dev-secret}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=print_shop
      - POSTGRES_USER=printshop
      - POSTGRES_PASSWORD=${DB_PASSWORD:-printshop123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: always

volumes:
  pgdata:
  redisdata:
