<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店家工作台 - 自助打印</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body { background: var(--gray-50); }
    .dashboard { display: grid; grid-template-columns: 320px 1fr; gap: 16px; padding: 16px; max-width: 1200px; margin: 0 auto; }
    .panel { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
    .panel-title { font-weight: 700; font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .order-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--gray-100);
    }
    .order-item:last-child { border-bottom: none; }
    .btn-xs { padding: 4px 12px; font-size: 12px; border-radius: 6px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .status-dot.online { background: var(--success); }
    .status-dot.offline { background: var(--danger); }
    .qr-section { text-align: center; }
    .qr-section canvas { margin: 0 auto; }
    .lan-url {
      background: #eef2ff; padding: 10px; border-radius: 8px;
      font-size: 17px; font-weight: 700; color: var(--primary);
      text-align: center; margin: 10px 0; word-break: break-all;
    }
    .tab-row { display: flex; gap: 0; border-bottom: 2px solid var(--gray-200); margin-bottom: 12px; }
    .tab-btn { padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--gray-500); }
    .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -2px; }
    .empty { text-align: center; color: var(--gray-400); padding: 24px; font-size: 14px; }
    .badge-count { background: var(--danger); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 4px; }
    @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="nav-bar">
    <span class="nav-title">🏪 店家工作台</span>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:12px;color:var(--gray-500)" id="clock">--</span>
      <button class="btn btn-sm btn-outline" onclick="refreshAll()">刷新</button>
    </div>
  </div>

  <div class="dashboard">
    <!-- 左侧: 二维码 + 打印机状态 -->
    <div>
      <div class="panel qr-section">
        <div class="panel-title">📱 顾客扫码下单</div>
        <div id="qrCode"></div>
        <div class="lan-url" id="lanUrl">加载中...</div>
        <div style="font-size:12px;color:var(--gray-500);margin-top:6px">
          顾客手机连同一WiFi，扫码或输入上方地址
        </div>
      </div>

      <div class="panel" style="margin-top:12px">
        <div class="panel-title">🖨️ 打印机状态</div>
        <div id="printerPanel">加载中...</div>
        <div style="margin-top:8px;display:flex;gap:6px;align-items:center">
          <select id="printerSelect" style="flex:1;padding:6px 8px;border-radius:6px;border:1px solid var(--gray-300);font-size:13px">
            <option value="">-- 选择打印机 --</option>
          </select>
          <button class="btn btn-sm btn-primary" onclick="selectPrinter()" style="white-space:nowrap">设为打印</button>
        </div>
        <div id="activePrinterHint" style="font-size:11px;color:var(--gray-500);margin-top:4px"></div>
      </div>

      <div class="panel" style="margin-top:12px">
        <div class="panel-title">📊 今日概览</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="todayStats">
          <div style="text-align:center;padding:8px;background:var(--gray-50);border-radius:8px">
            <div style="font-size:22px;font-weight:800;color:var(--primary)" id="statOrders">0</div>
            <div style="font-size:11px;color:var(--gray-500)">今日订单</div>
          </div>
          <div style="text-align:center;padding:8px;background:var(--gray-50);border-radius:8px">
            <div style="font-size:22px;font-weight:800;color:var(--success)" id="statRevenue">¥0</div>
            <div style="font-size:11px;color:var(--gray-500)">今日收入</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧: 订单管理 -->
    <div>
      <div class="tab-row" id="orderTabs">
        <button class="tab-btn active" data-tab="pending">待确认<span class="badge-count" id="badgePending" style="display:none">0</span></button>
        <button class="tab-btn" data-tab="queue">打印队列</button>
        <button class="tab-btn" data-tab="completed">已完成</button>
      </div>

      <div id="tab-pending">
        <div id="pendingList"><div class="empty">暂无待确认订单</div></div>
      </div>
      <div id="tab-queue" style="display:none">
        <div id="queueList"><div class="empty">暂无排队订单</div></div>
      </div>
      <div id="tab-completed" style="display:none">
        <div id="completedList"><div class="empty">暂无已完成订单</div></div>
      </div>
    </div>
  </div>

  <!-- 预览弹窗 -->
  <div id="previewModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:12px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-weight:700;font-size:15px" id="modalTitle">订单预览</span>
        <button class="btn btn-sm btn-outline" onclick="closePreview()">✕ 关闭</button>
      </div>
      <div style="background:var(--gray-200);border-radius:8px;padding:16px;min-height:300px;display:flex;align-items:center;justify-content:center" id="modalContent">
        <span style="color:var(--gray-500)">加载中...</span>
      </div>
      <div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:12px" id="modalNav">
        <button class="btn btn-sm btn-outline" onclick="modalPrev()">◀ 上一页</button>
        <span id="modalIndicator" style="font-weight:600">1/1</span>
        <button class="btn btn-sm btn-outline" onclick="modalNext()">下一页 ▶</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none"></div>

  <script src="/js/api.js"></script>
  <script src="/js/shop.js"></script>
</body>
</html>
